<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F2C"/>
      <stop offset="100%" stop-color="#060B1E"/>
    </linearGradient>
    <!-- Gold glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
    <!-- Emerald glow left -->
    <radialGradient id="glowL" cx="15%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#004225" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#004225" stop-opacity="0"/>
    </radialGradient>
    <!-- Text shadow -->
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>

  <!-- Stars -->
  <circle cx="80"  cy="60"  r="1.5" fill="#FFFBEA" opacity="0.8"/>
  <circle cx="200" cy="40"  r="1"   fill="#FFFBEA" opacity="0.6"/>
  <circle cx="350" cy="80"  r="2"   fill="#FFFBEA" opacity="0.7"/>
  <circle cx="520" cy="30"  r="1.5" fill="#FFFBEA" opacity="0.9"/>
  <circle cx="700" cy="55"  r="1"   fill="#FFFBEA" opacity="0.5"/>
  <circle cx="850" cy="25"  r="2"   fill="#FFFBEA" opacity="0.8"/>
  <circle cx="1000" cy="70" r="1.5" fill="#FFFBEA" opacity="0.6"/>
  <circle cx="1100" cy="40" r="1"   fill="#FFFBEA" opacity="0.7"/>
  <circle cx="150" cy="160" r="1"   fill="#FFFBEA" opacity="0.4"/>
  <circle cx="980" cy="140" r="1.5" fill="#FFFBEA" opacity="0.5"/>
  <circle cx="450" cy="100" r="1"   fill="#FFFBEA" opacity="0.6"/>
  <circle cx="760" cy="90"  r="2"   fill="#FFFBEA" opacity="0.4"/>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="12" fill="none" stroke="#D4AF37" stroke-width="1.2" opacity="0.35"/>
  <rect x="34" y="34" width="1132" height="562" rx="10" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.15"/>

  <!-- Corner ornaments -->
  <path d="M24 24 L24 80 Q24 90 34 90 L90 90" stroke="#D4AF37" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="57" cy="57" r="4" fill="#D4AF37" opacity="0.7"/>
  <path d="M1176 24 L1176 80 Q1176 90 1166 90 L1110 90" stroke="#D4AF37" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="1143" cy="57" r="4" fill="#D4AF37" opacity="0.7"/>
  <path d="M24 606 L24 550 Q24 540 34 540 L90 540" stroke="#D4AF37" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="57" cy="573" r="4" fill="#D4AF37" opacity="0.7"/>
  <path d="M1176 606 L1176 550 Q1176 540 1166 540 L1110 540" stroke="#D4AF37" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="1143" cy="573" r="4" fill="#D4AF37" opacity="0.7"/>

  <!-- Crescent + Star (centered top) -->
  <g transform="translate(540, 100)" filter="url(#softGlow)">
    <path d="M0 55C0 29.6 14.2 7.2 35 0C32.2 -0.5 29.2 -1 26 -1C4.5 -1 -13 17.5 -13 39C-13 60.5 4.5 79 26 79C29.2 79 32.2 78.5 35 78C14.2 70.8 0 80.4 0 55Z" fill="#D4AF37"/>
    <polygon points="55,0 59,12 72,12 62,20 66,32 55,24 44,32 48,20 38,12 51,12" fill="#D4AF37"/>
  </g>

  <!-- Main Arabic title -->
  <text
    x="600" y="290"
    text-anchor="middle"
    font-family="'Reem Kufi', 'Amiri', serif"
    font-size="100"
    fill="#D4AF37"
    filter="url(#textGlow)"
    opacity="0.95"
  >عِيدٌ مُبَارَك</text>

  <!-- English subtitle -->
  <text
    x="600" y="350"
    text-anchor="middle"
    font-family="'Cinzel', 'Georgia', serif"
    font-size="22"
    fill="#F5F0DC"
    letter-spacing="12"
    opacity="0.7"
  >EID  MUBARAK</text>

  <!-- Gold divider line -->
  <line x1="420" y1="378" x2="780" y2="378" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>
  <circle cx="600" cy="378" r="3" fill="#D4AF37" opacity="0.6"/>

  <!-- Salam text -->
  <text
    x="600" y="420"
    text-anchor="middle"
    font-family="'Amiri', serif"
    font-size="20"
    fill="#D4AF37"
    opacity="0.65"
  >السَّلامُ عَلَيْكُم وَرَحْمَةُ اللّٰهِ وَبَرَكَاتُهُ</text>

  <!-- CTA sub text -->
  <text
    x="600" y="468"
    text-anchor="middle"
    font-family="'Georgia', serif"
    font-size="17"
    fill="#F5F0DC"
    opacity="0.45"
    letter-spacing="3"
  >You have a personalized Eid greeting waiting</text>

  <!-- Lantern left -->
  <g transform="translate(130, 200)" opacity="0.85">
    <line x1="20" y1="0" x2="20" y2="15" stroke="#D4AF37" stroke-width="2" opacity="0.6"/>
    <rect x="8" y="15" width="24" height="6" rx="3" fill="#D4AF37" opacity="0.8"/>
    <path d="M10 21 Q2 50 4 72 L36 72 Q38 50 30 21Z" fill="rgba(212,175,55,0.1)" stroke="#D4AF37" stroke-width="1.2"/>
    <ellipse cx="20" cy="46" rx="8" ry="12" fill="rgba(255,220,80,0.15)"/>
    <rect x="8" y="72" width="24" height="6" rx="3" fill="#D4AF37" opacity="0.75"/>
  </g>

  <!-- Lantern right -->
  <g transform="translate(1010, 190)" opacity="0.85">
    <line x1="20" y1="0" x2="20" y2="15" stroke="#D4AF37" stroke-width="2" opacity="0.6"/>
    <rect x="8" y="15" width="24" height="6" rx="3" fill="#D4AF37" opacity="0.8"/>
    <path d="M10 21 Q2 50 4 72 L36 72 Q38 50 30 21Z" fill="rgba(212,175,55,0.1)" stroke="#D4AF37" stroke-width="1.2"/>
    <ellipse cx="20" cy="46" rx="8" ry="12" fill="rgba(255,220,80,0.15)"/>
    <rect x="8" y="72" width="24" height="6" rx="3" fill="#D4AF37" opacity="0.75"/>
  </g>

  <!-- Mosque silhouette -->
  <g transform="translate(0, 490)" opacity="0.9">
    <!-- Ground -->
    <rect x="0" y="118" width="1200" height="22" fill="#004225" opacity="0.7"/>
    <!-- Left minaret -->
    <rect x="60" y="24" width="28" height="94" fill="#002818"/>
    <ellipse cx="74" cy="24" rx="16" ry="24" fill="#002818"/>
    <rect x="68" y="4" width="12" height="22" fill="#002818"/>
    <polygon points="74,0 68,6 80,6" fill="#D4AF37" opacity="0.8"/>
    <!-- Right minaret -->
    <rect x="1112" y="24" width="28" height="94" fill="#002818"/>
    <ellipse cx="1126" cy="24" rx="16" ry="24" fill="#002818"/>
    <rect x="1120" y="4" width="12" height="22" fill="#002818"/>
    <polygon points="1126,0 1120,6 1132,6" fill="#D4AF37" opacity="0.8"/>
    <!-- Side domes -->
    <ellipse cx="280" cy="88" rx="55" ry="44" fill="#002818"/>
    <ellipse cx="920" cy="88" rx="55" ry="44" fill="#002818"/>
    <!-- Main dome -->
    <ellipse cx="600" cy="68" rx="96" ry="72" fill="#002818"/>
    <!-- Main body -->
    <rect x="200" y="100" width="800" height="30" fill="#002818"/>
    <!-- Windows -->
    <rect x="260" y="103" width="28" height="26" rx="14" fill="#D4AF37" opacity="0.18"/>
    <rect x="310" y="103" width="28" height="26" rx="14" fill="#D4AF37" opacity="0.18"/>
    <rect x="360" y="103" width="28" height="26" rx="14" fill="#D4AF37" opacity="0.15"/>
    <rect x="586" y="96" width="28" height="34" rx="14" fill="#D4AF37" opacity="0.22"/>
    <rect x="812" y="103" width="28" height="26" rx="14" fill="#D4AF37" opacity="0.15"/>
    <rect x="862" y="103" width="28" height="26" rx="14" fill="#D4AF37" opacity="0.18"/>
    <rect x="912" y="103" width="28" height="26" rx="14" fill="#D4AF37" opacity="0.18"/>
    <!-- Crescent on dome -->
    <path d="M586 34 C586 22 600 16 610 20 C607 21 604 26 604 34 C604 42 607 47 610 48 C600 52 586 46 586 34Z" fill="#D4AF37" opacity="0.8"/>
    <circle cx="614" cy="24" r="4" fill="#D4AF37" opacity="0.8"/>
  </g>
</svg>
